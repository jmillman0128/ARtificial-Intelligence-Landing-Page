name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Creates relay-config.js from the RELAY_URL repository secret.
      # Add RELAY_URL under: Settings > Secrets and variables > Actions > New repository secret
      - name: Inject relay URL
        env:
          RELAY_URL: ${{ secrets.RELAY_URL }}
        run: printf 'window.RELAY_URL = "%s";\n' "$RELAY_URL" > relay-config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
